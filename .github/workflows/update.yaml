name: Update ICS

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 nightly
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download ICS
        run: curl -s -o bromley.ics https://recyclingservices.bromley.gov.uk/waste/6246459/calendar.ics

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add bromley.ics
          git commit -m "Nightly ICS update" || echo "No changes"
          git push
