name: Update ICS

on:
  schedule:
    - cron: "0 3 * * *"   # nightly at 03:00
  workflow_dispatch:

permissions:
  contents: write   # THIS is the fix

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # allow pushing

      - name: Download ICS
        run: curl -s -o bromley.ics https://recyclingservices.bromley.gov.uk/waste/6246459/calendar.ics

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add bromley.ics
          git commit -m "Nightly ICS update" || echo "No changes to commit"
          git push
